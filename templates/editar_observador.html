<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Observador Anual</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: #eef2f7;
            font-family: Arial, sans-serif;
        }

        .navbar-custom {
            background: #0d6efd;
        }

        .navbar-brand {
            color: #fff !important;
            font-weight: 700;
        }

        .card-box {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 10px rgba(0,0,0,.08);
        }

        .header-box {
            background: #0d6efd;
            color: #fff;
            font-weight: 700;
            padding: 14px 18px;
            border-radius: 12px 12px 0 0;
        }

        textarea.form-control {
            min-height: 150px;
            resize: vertical;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container-fluid px-3">
        <a href="{{ url_for('boletin_bp.observador', id_estudiante=estudiante['ID_Estudiante']) }}" class="navbar-brand text-decoration-none">
            <i class="bi bi-journal-text me-2"></i>Editar Observador Anual
        </a>
        <div>
            <a href="{{ url_for('boletin_bp.observador', id_estudiante=estudiante['ID_Estudiante']) }}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Volver al observador
            </a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="card card-box">
        <div class="header-box">
            <i class="bi bi-person-lines-fill me-2"></i>{{ estudiante['Nombres'] }} {{ estudiante['Apellidos'] }} - {{ estudiante['Nombre_Grupo'] }}
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label fw-bold">Observaciones generales</label>
                    <textarea name="observaciones_generales"
                              class="form-control"
                              placeholder="Escriba aquí las observaciones generales del año...">{{ anual['Observaciones_Generales'] if anual else '' }}</textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Concepto final</label>
                    <input type="text"
                           name="concepto_final"
                           class="form-control"
                           value="{{ anual['Concepto_Final'] if anual else '' }}"
                           placeholder="Ejemplo: PROMOVIDO (A)">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Promovido a</label>
                    <input type="text"
                           name="promovido_a"
                           class="form-control"
                           value="{{ anual['Promovido_A'] if anual else '' }}"
                           placeholder="Ejemplo: AL GRADO SEGUNDO">
                </div>

                <div class="d-flex gap-2">
                    <a href="{{ url_for('boletin_bp.observador', id_estudiante=estudiante['ID_Estudiante']) }}"
                       class="btn btn-secondary">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save me-1"></i>Guardar observador anual
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
